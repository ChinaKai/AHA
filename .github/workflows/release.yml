name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish as a GitHub Release. Leave empty to build artifacts only."
        required: false
        type: string

permissions:
  contents: write

jobs:
  onebin:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Run release checks
        run: python -m unittest tests.test_app_version tests.test_service_installers tests.test_service_upgrade tests.test_web_system_routes

      - name: Build onebin
        run: python scripts/build_onebin.py --output dist/aha

      - name: Smoke packaged CLI
        run: python scripts/smoke_onebin_cli.py --artifact dist/aha

      - name: Prepare release assets
        run: |
          cp scripts/install_user_service.sh dist/install_user_service.sh
          chmod 0755 dist/aha dist/install_user_service.sh
          (cd dist && sha256sum aha install_user_service.sh > SHA256SUMS)

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aha-onebin
          path: |
            dist/aha
            dist/install_user_service.sh
            dist/SHA256SUMS

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          release_tag=""
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          elif [[ -n "${DISPATCH_TAG}" ]]; then
            release_tag="${DISPATCH_TAG}"
          fi
          if [[ -z "${release_tag}" ]]; then
            echo "No release tag selected; workflow artifact uploaded only."
            exit 0
          fi
          if gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release upload "${release_tag}" dist/aha dist/install_user_service.sh dist/SHA256SUMS --clobber
          else
            gh release create "${release_tag}" dist/aha dist/install_user_service.sh dist/SHA256SUMS \
              --title "AHA ${release_tag}" \
              --notes "Automated AHA release ${release_tag}."
          fi
