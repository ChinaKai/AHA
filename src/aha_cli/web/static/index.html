<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AHA Dashboard</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header>
    <div>
      <h1><span class="brand-short">AHA</span><span class="brand-full"> Dashboard</span><span id="header-workspace-dir" class="header-workspace-dir"></span></h1>
      <div id="run-state" class="meta"></div>
    </div>
    <div id="session-control" class="session-control">
      <button id="session-toggle" class="session-toggle" type="button" aria-label="Run 操作台" title="Run 操作台" aria-controls="session-menu" aria-expanded="false">
        <span class="session-icon" aria-hidden="true">⋯</span>
        <strong id="session-title" class="sr-only">加载中...</strong>
      </button>
      <div id="session-menu" class="session-menu hidden">
        <div class="session-menu-head">
          <span>Run 操作台</span>
          <button id="session-refresh" type="button">刷新</button>
        </div>
        <select id="run-select"></select>
        <form id="run-create-form" class="session-create">
          <input id="new-run-goal" placeholder="新 Run goal">
          <select id="new-run-mode" aria-label="Run mode">
            <option value="research">research</option>
            <option value="implementation">implementation</option>
          </select>
          <button type="submit">新建</button>
        </form>
        <div class="run-archive">
          <div class="run-archive-actions">
            <button id="run-export" type="button">导出</button>
            <button id="run-import" type="button">导入</button>
            <label class="run-archive-logs">
              <input id="run-export-logs" type="checkbox">
              <span>包含日志</span>
            </label>
          </div>
          <input id="run-import-file" type="file" accept=".tar,.tar.gz,.tgz,.tar.bz2,.tar.xz,application/gzip,application/x-tar" hidden>
          <div id="run-archive-state" class="meta"></div>
        </div>
        <div id="session-detail" class="meta"><span id="session-detail-text">Run 详情</span><code id="run-id"></code></div>
      </div>
    </div>
    <button id="mobile-task-summary" class="mobile-task-summary" type="button" aria-controls="overview-sidebar" aria-expanded="false">
      <span id="mobile-task-title">No task</span>
      <span id="mobile-task-status" class="status pending">pending</span>
    </button>
  </header>
  <div id="mobile-sheet-backdrop" class="mobile-sheet-backdrop" hidden></div>
  <main>
    <aside id="overview-sidebar" class="sidebar">
      <button id="overview-rail-toggle" class="side-rail-toggle" type="button" aria-controls="overview-sidebar" aria-expanded="false">Overview</button>
      <div class="run-summary">
        <div class="panel-title-row">
          <h2>Run Overview</h2>
          <button id="collapse-overview" class="panel-collapse" type="button" aria-controls="overview-sidebar" aria-expanded="true">Hide</button>
          <button id="close-tasks-sheet" class="mobile-sheet-close" type="button" aria-controls="overview-sidebar">Close</button>
        </div>
        <div id="summary" class="meta">Loading...</div>
        <button id="open-task-create" class="task-create-trigger" type="button">New Task</button>
      </div>
      <div class="task-list-tools">
        <label>
          <input id="show-hidden" type="checkbox">
          <span>Show hidden tasks</span>
        </label>
        <details id="task-proxy-editor" class="task-proxy-editor">
          <summary>Task proxy</summary>
          <form id="task-proxy-form" class="proxy-form">
            <label class="field-label">
              <span>HTTP proxy</span>
              <input id="selected-task-http-proxy" placeholder="http://127.0.0.1:7890">
            </label>
            <label class="field-label">
              <span>HTTPS proxy</span>
              <input id="selected-task-https-proxy" placeholder="http://127.0.0.1:7890">
            </label>
            <label class="field-label">
              <span>NO_PROXY</span>
              <input id="selected-task-no-proxy" placeholder="localhost,127.0.0.1,::1">
            </label>
            <label class="checkbox-line">
              <input id="selected-task-proxy-enabled" type="checkbox">
              <span>Enable by default for new agents</span>
            </label>
            <button type="submit">Save Proxy</button>
            <div id="task-proxy-state" class="meta"></div>
          </form>
        </details>
      </div>
      <div id="tasks" class="task-list"></div>
    </aside>
    <section class="workspace">
      <div class="task-header">
        <div class="task-header-top">
          <div>
            <div id="selected-id" class="meta"></div>
            <h2 id="selected-title" class="task-heading">Select a task</h2>
            <div id="selected-task-meta" class="meta"></div>
          </div>
          <span id="selected-status" class="status pending">pending</span>
        </div>
        <div class="mobile-context-actions">
          <button id="open-tasks-sheet" type="button" aria-controls="overview-sidebar" aria-expanded="false">Tasks</button>
          <button id="open-agents-sheet" type="button" aria-controls="agents-sidebar" aria-expanded="false">Agents</button>
        </div>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="conversation">Conversation</button>
        <button class="tab" data-tab="final">Final</button>
        <button class="tab" data-tab="logs">Logs</button>
        <button class="tab" data-tab="context">Context</button>
      </div>
      <div id="conversation-filters" class="conversation-filters"></div>
      <div id="panel" class="panel"></div>
      <div id="selected-agent-info" class="selected-agent-info"></div>
      <div id="backend-status" class="backend-status"></div>
      <div id="pending-messages" class="pending-messages hidden"></div>
      <div id="command-menu" class="command-menu hidden"></div>
      <div id="mobile-action-panel" class="mobile-action-panel" hidden>
        <button type="button" data-mobile-action="conversation">Chat</button>
        <button type="button" data-mobile-action="final">Final</button>
        <button type="button" data-mobile-action="logs">Logs</button>
        <button type="button" data-mobile-action="context">Context</button>
        <button type="button" data-mobile-action="tasks">Tasks</button>
        <button type="button" data-mobile-action="agents">Agents</button>
        <button type="button" data-mobile-action="add-task">Add Task</button>
      </div>
      <form id="send-form" class="composer">
        <select id="agent-target"></select>
        <input id="message" placeholder="Message in the selected task context" autocomplete="off" enterkeyhint="send">
        <button id="mobile-actions-toggle" class="mobile-actions-toggle" type="button" aria-controls="mobile-action-panel" aria-expanded="false">+</button>
        <button class="send" type="submit">Send</button>
      </form>
    </section>
    <aside id="agents-sidebar" class="agentbar">
      <button id="agents-rail-toggle" class="side-rail-toggle" type="button" aria-controls="agents-sidebar" aria-expanded="false">Agents</button>
      <div class="agent-panel">
        <div class="panel-title-row">
          <h2>Agents</h2>
          <button id="collapse-agents" class="panel-collapse" type="button" aria-controls="agents-sidebar" aria-expanded="true">Hide</button>
          <button id="close-agents-sheet" class="mobile-sheet-close" type="button" aria-controls="agents-sidebar">Close</button>
        </div>
        <div id="agents"></div>
      </div>
    </aside>
  </main>
  <dialog id="task-create-dialog" class="task-dialog" aria-labelledby="task-create-title">
    <div class="task-dialog-panel">
      <div class="task-dialog-head">
        <div>
          <h2 id="task-create-title">New Task</h2>
          <p>Create a task and dispatch its backend agent.</p>
        </div>
        <button id="close-task-create" class="task-dialog-close" type="button" aria-label="Close task form">×</button>
      </div>
      <form id="task-form" class="stack-form task-create-form">
        <div id="task-run-context" class="task-run-context meta">当前 Run 加载中...</div>
        <fieldset class="form-section">
          <legend>Task</legend>
          <input id="new-task-title" placeholder="New task title">
          <select id="workspace-select" aria-label="Workspace"></select>
          <input id="workspace-custom" class="hidden" placeholder="Custom workspace path">
        </fieldset>
        <fieldset class="form-section">
          <legend>Defaults</legend>
          <div class="field-row">
            <label class="field-label">
              <span>Default backend</span>
              <select id="task-backend"></select>
            </label>
            <label class="field-label">
              <span>Default model</span>
              <select id="task-model"></select>
            </label>
          </div>
        </fieldset>
        <details class="form-section advanced-task-options">
          <summary>Advanced</summary>
          <div class="field-row">
            <label class="field-label">
              <span>Default sandbox</span>
              <select id="task-sandbox">
                <option value="workspace-write">workspace-write</option>
                <option value="read-only">read-only</option>
                <option value="danger-full-access">danger-full-access</option>
              </select>
            </label>
            <label class="field-label">
              <span>Default approval</span>
              <select id="task-approval">
                <option value="never">never</option>
                <option value="on-failure">on-failure</option>
                <option value="on-request">on-request</option>
                <option value="untrusted">untrusted</option>
              </select>
            </label>
          </div>
          <div class="field-row">
            <label class="field-label">
              <span>Delegation</span>
              <select id="delegation-policy">
                <option value="auto">auto</option>
                <option value="disabled">off</option>
              </select>
            </label>
            <label id="max-sub-agents-field" class="field-label">
              <span>Max auto sub-agents</span>
              <input id="max-sub-agents" type="number" min="1" max="16" value="3">
            </label>
          </div>
          <div class="field-row">
            <label class="field-label">
              <span>HTTP proxy</span>
              <input id="task-http-proxy" placeholder="http://127.0.0.1:7890">
            </label>
            <label class="field-label">
              <span>HTTPS proxy</span>
              <input id="task-https-proxy" placeholder="http://127.0.0.1:7890">
            </label>
          </div>
          <div class="field-row">
            <label class="field-label">
              <span>NO_PROXY</span>
              <input id="task-no-proxy" placeholder="localhost,127.0.0.1,::1">
            </label>
            <label class="field-label checkbox-field">
              <span>Proxy default</span>
              <span class="checkbox-line">
                <input id="task-proxy-enabled" type="checkbox">
                <span>Enable for new agents</span>
              </span>
            </label>
          </div>
        </details>
        <div class="task-dialog-actions">
          <button id="cancel-task-create" type="button">Cancel</button>
          <button class="primary" type="submit">Create Task</button>
        </div>
      </form>
    </div>
  </dialog>
  <dialog id="task-create-confirm" class="confirm-dialog" aria-labelledby="task-create-confirm-title">
    <form method="dialog" class="confirm-dialog-panel">
      <div class="confirm-dialog-head">
        <h2 id="task-create-confirm-title">Create Task?</h2>
        <p>Confirm the task settings before dispatching a backend agent.</p>
      </div>
      <dl id="task-create-confirm-details" class="confirm-dialog-details"></dl>
      <div class="confirm-dialog-actions">
        <button type="submit" value="cancel">Cancel</button>
        <button class="primary" type="submit" value="confirm">Create Task</button>
      </div>
    </form>
  </dialog>
  <script src="/static/app.js"></script>
</body>
</html>
