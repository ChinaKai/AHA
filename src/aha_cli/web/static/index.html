<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AHA Dashboard</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header>
    <div>
      <h1><span class="brand-short">AHA</span><span class="brand-full"> Dashboard</span><span id="header-workspace-dir" class="header-workspace-dir"></span></h1>
      <div id="run-state" class="meta"></div>
    </div>
    <div id="session-control" class="session-control">
      <button id="session-toggle" class="session-toggle" type="button" aria-label="会话历史" title="会话历史" aria-controls="session-menu" aria-expanded="false">
        <span class="session-icon" aria-hidden="true">⋯</span>
        <strong id="session-title" class="sr-only">加载中...</strong>
      </button>
      <div id="session-menu" class="session-menu hidden">
        <div class="session-menu-head">
          <span>会话历史</span>
          <button id="session-refresh" type="button">刷新</button>
        </div>
        <select id="run-select"></select>
        <form id="run-create-form" class="session-create">
          <input id="new-run-goal" placeholder="新会话目标">
          <button type="submit">新建</button>
        </form>
        <div id="session-detail" class="meta"><span id="session-detail-text">会话详情</span><code id="run-id"></code></div>
      </div>
    </div>
    <button id="mobile-task-summary" class="mobile-task-summary" type="button" aria-controls="overview-sidebar" aria-expanded="false">
      <span id="mobile-task-title">No task</span>
      <span id="mobile-task-status" class="status pending">pending</span>
    </button>
  </header>
  <div id="mobile-sheet-backdrop" class="mobile-sheet-backdrop" hidden></div>
  <main>
    <aside id="overview-sidebar" class="sidebar">
      <button id="overview-rail-toggle" class="side-rail-toggle" type="button" aria-controls="overview-sidebar" aria-expanded="false">Overview</button>
      <div class="run-summary">
        <div class="panel-title-row">
          <h2>Run Overview</h2>
          <button id="collapse-overview" class="panel-collapse" type="button" aria-controls="overview-sidebar" aria-expanded="true">Hide</button>
          <button id="close-tasks-sheet" class="mobile-sheet-close" type="button" aria-controls="overview-sidebar">Close</button>
        </div>
        <div id="summary" class="meta">Loading...</div>
        <details id="task-create" class="task-create">
          <summary>Add Task</summary>
          <form id="task-form" class="stack-form">
            <input id="new-task-title" placeholder="New task title">
            <select id="workspace-select"></select>
            <input id="workspace-custom" class="hidden" placeholder="Custom workspace path">
            <div class="field-row">
              <label class="field-label">
                <span>Backend</span>
                <select id="task-backend"></select>
              </label>
              <label class="field-label">
                <span>Model</span>
                <select id="task-model"></select>
              </label>
            </div>
            <div class="field-row">
              <label class="field-label">
                <span>Sandbox</span>
                <select id="task-sandbox">
                  <option value="workspace-write">workspace-write</option>
                  <option value="read-only">read-only</option>
                  <option value="danger-full-access">danger-full-access</option>
                </select>
              </label>
              <label class="field-label">
                <span>Approval</span>
                <select id="task-approval">
                  <option value="never">never</option>
                  <option value="on-failure">on-failure</option>
                  <option value="on-request">on-request</option>
                  <option value="untrusted">untrusted</option>
                </select>
              </label>
            </div>
            <div class="field-row">
              <select id="delegation-policy">
                <option value="auto">auto delegation</option>
                <option value="disabled">no delegation</option>
              </select>
              <input id="max-sub-agents" type="number" min="0" max="16" value="3" placeholder="Max sub">
            </div>
            <button type="submit">Add Task</button>
          </form>
        </details>
      </div>
      <div class="task-list-tools">
        <label>
          <input id="show-hidden" type="checkbox">
          <span>Show hidden tasks</span>
        </label>
      </div>
      <div id="tasks" class="task-list"></div>
    </aside>
    <section class="workspace">
      <div class="task-header">
        <div class="task-header-top">
          <div>
            <div id="selected-id" class="meta"></div>
            <h2 id="selected-title" class="task-heading">Select a task</h2>
            <div id="selected-task-meta" class="meta"></div>
          </div>
          <span id="selected-status" class="status pending">pending</span>
        </div>
        <div class="mobile-context-actions">
          <button id="open-tasks-sheet" type="button" aria-controls="overview-sidebar" aria-expanded="false">Tasks</button>
          <button id="open-agents-sheet" type="button" aria-controls="agents-sidebar" aria-expanded="false">Agents</button>
        </div>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="conversation">Conversation</button>
        <button class="tab" data-tab="final">Final</button>
        <button class="tab" data-tab="logs">Logs</button>
        <button class="tab" data-tab="context">Context</button>
      </div>
      <div id="conversation-filters" class="conversation-filters"></div>
      <div id="panel" class="panel"></div>
      <div id="selected-agent-info" class="selected-agent-info"></div>
      <div id="backend-status" class="backend-status"></div>
      <div id="command-menu" class="command-menu hidden"></div>
      <div id="mobile-action-panel" class="mobile-action-panel" hidden>
        <button type="button" data-mobile-action="conversation">Chat</button>
        <button type="button" data-mobile-action="final">Final</button>
        <button type="button" data-mobile-action="logs">Logs</button>
        <button type="button" data-mobile-action="context">Context</button>
        <button type="button" data-mobile-action="tasks">Tasks</button>
        <button type="button" data-mobile-action="agents">Agents</button>
        <button type="button" data-mobile-action="add-task">Add Task</button>
      </div>
      <form id="send-form" class="composer">
        <select id="agent-target"></select>
        <input id="message" placeholder="Message in the selected task context" autocomplete="off" enterkeyhint="send">
        <button id="mobile-actions-toggle" class="mobile-actions-toggle" type="button" aria-controls="mobile-action-panel" aria-expanded="false">+</button>
        <button class="send" type="submit">Send</button>
      </form>
    </section>
    <aside id="agents-sidebar" class="agentbar">
      <button id="agents-rail-toggle" class="side-rail-toggle" type="button" aria-controls="agents-sidebar" aria-expanded="false">Agents</button>
      <div class="agent-panel">
        <div class="panel-title-row">
          <h2>Agents</h2>
          <button id="collapse-agents" class="panel-collapse" type="button" aria-controls="agents-sidebar" aria-expanded="true">Hide</button>
          <button id="close-agents-sheet" class="mobile-sheet-close" type="button" aria-controls="agents-sidebar">Close</button>
        </div>
        <div id="agents"></div>
      </div>
    </aside>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
