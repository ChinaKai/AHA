<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AHA Knowledge Base</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    /* Layered on top of the app stylesheet so the console matches the
       Weixin console look: same tokens, surfaces, borders, status pills. */
    * { box-sizing: border-box; }
    body {
      min-height: 100vh; overflow-x: hidden; overflow-y: auto;
      background: var(--color-bg); color: var(--color-text);
    }
    .kb-wrap { width: min(100%, 960px); margin: 0 auto; padding: 0 20px 56px; }
    .kb-console-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; padding: 16px 0 12px; border-bottom: 1px solid var(--color-border-subtle);
    }
    .kb-console-head > div { min-width: 0; }
    .kb-console-head h1 { margin: 0; font-size: 18px; color: var(--color-text-strong); }
    .kb-console-head p { margin: 4px 0 0; font-size: 12px; color: var(--color-text-subtle); }
    .kb-tabs { display: flex; gap: 8px; margin: 14px 0; flex-wrap: wrap; }
    .kb-tabs button { min-width: 0; }
    .kb-tab.active {
      border-color: var(--color-primary); background: var(--color-primary-surface);
      color: var(--color-primary-strong); font-weight: 650;
    }
    .kb-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 10px 0; }
    .kb-row > * { min-width: 0; }
    .kb-card {
      display: grid; gap: 6px; min-width: 0; padding: 12px; margin: 10px 0;
      border: 1px solid var(--color-border-subtle); border-radius: var(--radius-md);
      background: var(--color-surface); overflow-wrap: anywhere;
    }
    .kb-card h3 { margin: 0; font-size: 15px; color: var(--color-text-strong); }
    .kb-muted { color: var(--color-text-subtle); font-size: 12px; overflow-wrap: anywhere; }
    .kb-tag {
      display: inline-block; font-size: 11px; background: var(--status-bg);
      color: var(--status-text); border-radius: 999px; padding: 1px 8px; margin-right: 4px;
    }
    .kb-card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
    .kb-card-actions button { min-height: var(--control-height-sm); padding: 0 var(--control-padding-x-sm); font-size: 12px; }
    .kb-entry-actions button { min-width: 0; }
    .kb-pending-actions { margin: 0 0 2px; }
    button.kb-approve { border-color: #bbf7d0; background: var(--color-success-surface); color: var(--color-success); font-weight: 650; }
    button.kb-reject { border-color: #fecaca; background: var(--color-danger-surface); color: var(--color-danger); }
    .kb-body {
      white-space: pre-wrap; background: var(--color-surface-muted);
      border: 1px solid var(--color-border-subtle); border-radius: var(--radius-sm);
      padding: 10px; max-width: 100%; overflow-x: auto; overflow-wrap: anywhere;
      font-size: 13px; color: var(--color-text);
    }
    .kb-entry-body { white-space: normal; }
    .kb-entry-body pre { white-space: pre-wrap; }
    .kb-entry-ref-modal { width: min(92vw, 860px); max-height: 90vh; overflow: auto; }
    .kb-edit-form { display: grid; gap: 8px; margin-top: 4px; }
    .kb-edit-form textarea {
      min-height: 220px; resize: vertical; width: 100%;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .kb-pending-body { max-height: min(420px, 55vh); overflow: auto; }
    #capture-list .kb-card { padding: 8px 10px; margin: 6px 0; gap: 4px; }
    #capture-list .kb-card h3 { font-size: 14px; }
    .kb-cap-preview { font-size: 12px; color: var(--color-text); overflow-wrap: anywhere; white-space: pre-wrap; max-height: 2.8em; overflow: hidden; }
    .kb-capture-toolbar { justify-content: flex-end; margin: 0 0 8px; }
    .kb-modal { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 50; }
    .kb-modal[hidden] { display: none; }
    .kb-modal-card { background: var(--color-surface); padding: 16px; border-radius: var(--radius-md); min-width: 260px; max-width: 92vw; display: grid; gap: 10px; box-shadow: 0 8px 30px rgba(0,0,0,.25); }
    .kb-modal-card h3 { margin: 0; font-size: 15px; }
    .kb-log-modal { width: min(92vw, 860px); max-height: 90vh; overflow: auto; }
    .kb-log-label { margin: 4px 0 0; font-size: 12px; color: var(--color-text-subtle); }
    .kb-log-body { max-height: min(360px, 35vh); overflow: auto; }
    .kb-capture-form { width: min(92vw, 640px); }
    .kb-capture-form textarea, .kb-cap-edit, .kb-cap-edit-title { width: 100%; box-sizing: border-box; }
    .kb-capture-form textarea, .kb-cap-edit { resize: vertical; }
    .kb-capture-form textarea { min-height: 180px; }
    .kb-cap-edit-tools { align-items: center; margin: 6px 0 0; }
    .kb-cap-images { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 4px 0; }
    .kb-cap-thumb { position: relative; display: inline-flex; }
    .kb-cap-thumb img { width: 56px; height: 56px; object-fit: cover; border-radius: 6px; border: 1px solid var(--color-border, #ccc); }
    .kb-cap-thumb button { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; line-height: 16px; padding: 0; border-radius: 50%; font-size: 12px; }
    .kb-cap-upload { font-size: 12px; cursor: pointer; padding: 4px 8px; border: 1px dashed var(--color-border, #ccc); border-radius: 6px; }
    .kb-field { display: block; margin: 10px 0 4px; font-size: 12px; color: var(--color-text-muted); }
    .kb-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px; align-items: start; }
    .kb-form-grid > div { min-width: 0; display: flex; flex-direction: column; }
    .kb-form-grid input[type=text], .kb-form-grid select { width: 100%; box-sizing: border-box; }
    .kb-form-grid label.kb-field { display: flex; align-items: center; gap: 6px; }
    .kb-form-grid label.kb-field input[type=checkbox] { flex: none; margin: 0; }
    .kb-settings-card { padding: 14px; }
    .kb-toast {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      width: max-content; max-width: calc(100vw - 24px);
      background: var(--color-text-strong); color: #fff; padding: 8px 16px;
      border-radius: var(--radius-md); box-shadow: var(--shadow-popover); opacity: 0;
      transition: opacity .2s; pointer-events: none; text-align: center;
    }
    .kb-toast.show { opacity: 1; }
    @media (max-width: 640px) {
      .kb-wrap { padding: 0 12px 44px; }
      .kb-console-head { display: grid; gap: 10px; padding-top: 12px; }
      .kb-console-head .status { width: fit-content; max-width: 100%; }
      .kb-tabs { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 4px; }
      .kb-tabs button {
        width: 100%; min-height: 32px; padding: 0 4px;
        justify-content: center; white-space: nowrap; font-size: 11px;
      }
      .kb-row { display: grid; grid-template-columns: 1fr; }
      .kb-row > select, .kb-row > input, .kb-row > button { width: 100%; }
      .kb-card { padding: 10px; }
      .kb-card-actions { display: grid; grid-template-columns: 1fr; }
      .kb-card-actions button { width: 100%; }
      .kb-entry-actions {
        display: grid; grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 4px;
      }
      .kb-entry-actions button {
        width: 100%; min-height: 30px; padding: 0 4px;
        font-size: 11px; white-space: nowrap;
      }
      .kb-cap-actions {
        display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 4px;
      }
      .kb-cap-actions button {
        width: 100%; min-height: 30px; padding: 0 4px;
        font-size: 11px; white-space: nowrap;
      }
      .kb-pending-body { max-height: 38vh; }
      .kb-form-grid { grid-template-columns: 1fr; gap: 0; }
      .kb-settings-card { padding: 12px; }
    }
  </style>
</head>
<body>
 <div class="kb-wrap">
  <div class="kb-console-head">
    <div>
      <h1 data-i18n="knowledge.title">AHA Knowledge Base</h1>
      <p data-i18n="knowledge.subtitle">Browse entries · Review pending candidates · Configure the knowledge base</p>
    </div>
    <span id="kb-summary" class="status idle" data-i18n="knowledge.loading">Loading...</span>
  </div>

  <nav class="kb-tabs">
    <button data-tab="entries" class="button-ghost kb-tab active" type="button"><span data-i18n="knowledge.tab_entries">Entries</span></button>
    <button data-tab="pending" class="button-ghost kb-tab" type="button"><span data-i18n="knowledge.tab_pending">Pending</span> <span id="pending-badge"></span></button>
    <button data-tab="capture" class="button-ghost kb-tab" type="button"><span data-i18n="knowledge.tab_capture">Capture</span></button>
    <button data-tab="settings" class="button-ghost kb-tab" type="button"><span data-i18n="common.settings">Settings</span></button>
  </nav>

  <section id="tab-entries">
    <div class="kb-row">
      <select id="f-scope" aria-label="Scope filter" data-i18n-aria-label="knowledge.scope_filter"><option value="" data-i18n="knowledge.scope_all">All scopes</option><option value="project" data-i18n="knowledge.scope_project">Project</option><option value="general" data-i18n="knowledge.scope_general">General</option><option value="personal" data-i18n="knowledge.scope_personal">Personal</option></select>
      <select id="f-kind" aria-label="Type filter" data-i18n-aria-label="knowledge.type_filter"><option value="" data-i18n="knowledge.type_all">All types</option><option value="solutions" data-i18n="knowledge.type_solutions">Solutions</option><option value="wiki" data-i18n="knowledge.type_wiki">Wiki</option><option value="navigation" data-i18n="knowledge.type_navigation">Project navigation</option></select>
      <input id="f-project" type="text" placeholder="Filter by project key" data-i18n-placeholder="knowledge.project_filter" />
      <input id="f-search" type="search" placeholder="Search title, tags, or body" data-i18n-placeholder="knowledge.search_filter" />
      <button class="button-ghost" id="f-refresh" type="button" data-i18n="common.refresh">Refresh</button>
    </div>
    <div id="entries-list"></div>
  </section>

  <section id="tab-pending" hidden>
    <div id="pending-list"></div>
  </section>

  <section id="tab-capture" hidden>
    <div class="kb-row kb-capture-toolbar">
      <button class="primary" id="cap-new-open" type="button" data-i18n="knowledge.capture_add">New note</button>
    </div>
    <div id="capture-list"></div>
  </section>

  <div id="cap-new-modal" class="kb-modal" hidden>
    <form id="capture-form" class="kb-modal-card kb-capture-form">
      <h3 data-i18n="knowledge.capture_add">New note</h3>
      <div class="kb-row">
        <input id="cap-title" type="text" placeholder="Optional title" data-i18n-placeholder="knowledge.capture_title_placeholder" />
        <select id="cap-scope" aria-label="Scope hint"><option value="personal" data-i18n="knowledge.scope_personal">Personal</option><option value="general" data-i18n="knowledge.scope_general">General</option><option value="project" data-i18n="knowledge.scope_project">Project</option></select>
      </div>
      <textarea id="cap-text" rows="7" placeholder="Dump raw notes here…" data-i18n-placeholder="knowledge.capture_new_placeholder"></textarea>
      <div class="kb-row kb-cap-edit-tools">
        <label class="kb-cap-upload" for="cap-new-image"><span data-i18n="knowledge.capture_add_image">+ image</span><input id="cap-new-image" type="file" accept="image/png,image/jpeg,image/webp" hidden /></label>
        <span id="cap-new-image-count" class="kb-muted"></span>
      </div>
      <div class="kb-card-actions">
        <button class="primary" type="submit" data-i18n="knowledge.capture_create">Create</button>
        <button class="button-ghost" type="button" id="cap-new-cancel" data-i18n="common.cancel">Cancel</button>
      </div>
    </form>
  </div>

  <div id="cap-distill-modal" class="kb-modal" hidden>
    <div class="kb-modal-card">
      <h3 data-i18n="knowledge.capture_distill">Distill</h3>
      <div class="kb-row">
        <span class="kb-muted" data-i18n="knowledge.capture_agent_label">Distill agent:</span>
        <select id="cap-backend" aria-label="Distill backend"></select>
        <select id="cap-model" aria-label="Distill model"></select>
      </div>
      <div class="kb-row">
        <label class="kb-field"><input type="checkbox" id="cap-proxy-enabled" /> <span data-i18n="knowledge.capture_proxy_enabled">Use proxy</span></label>
      </div>
      <div class="kb-card-actions">
        <button class="kb-approve" type="button" id="cap-distill-go" data-i18n="knowledge.capture_distill">Distill</button>
        <button class="button-ghost" type="button" id="cap-distill-cancel" data-i18n="common.cancel">Cancel</button>
      </div>
    </div>
  </div>

  <div id="cap-log-modal" class="kb-modal" hidden>
    <div class="kb-modal-card kb-log-modal">
      <h3 data-i18n="knowledge.capture_agent_log">Agent log</h3>
      <div id="cap-log-meta" class="kb-muted"></div>
      <div class="kb-log-label" data-i18n="knowledge.capture_log_prompt">Prompt</div>
      <pre id="cap-log-prompt" class="kb-body kb-log-body"></pre>
      <div class="kb-log-label" data-i18n="knowledge.capture_log_reply">Reply</div>
      <pre id="cap-log-reply" class="kb-body kb-log-body"></pre>
      <div class="kb-card-actions">
        <button class="button-ghost" type="button" id="cap-log-close" data-i18n="common.close">Close</button>
      </div>
    </div>
  </div>

  <div id="entry-ref-modal" class="kb-modal" hidden>
    <div class="kb-modal-card kb-entry-ref-modal">
      <h3 id="entry-ref-title">Reference</h3>
      <div id="entry-ref-meta" class="kb-muted"></div>
      <div id="entry-ref-body" class="kb-body kb-entry-body" data-entry-body="reference"></div>
      <div class="kb-card-actions">
        <button class="button-ghost" type="button" id="entry-ref-edit" data-i18n="knowledge.edit">Edit</button>
        <button class="button-ghost" type="button" id="entry-ref-close" data-i18n="common.close">Close</button>
      </div>
    </div>
  </div>

  <section id="tab-settings" hidden>
    <form id="settings-form" class="kb-card kb-settings-card">
      <div class="kb-form-grid">
        <div>
          <label class="kb-field"><input type="checkbox" id="s-enabled" /> <span data-i18n="knowledge.enable">Enable knowledge base</span></label>
          <label class="kb-field" for="s-path" data-i18n="knowledge.storage_path">Storage path (blank = default ~/.aha/knowledge)</label>
          <input type="text" id="s-path" />
          <label class="kb-field" for="s-gate" data-i18n="knowledge.curation_gate">Curation gate</label>
          <select id="s-gate"><option value="manual">manual</option><option value="auto">auto</option><option value="off">off</option></select>
        </div>
        <div>
          <label class="kb-field"><input type="checkbox" id="s-git-enabled" /> <span data-i18n="knowledge.enable_git">Enable git sync</span></label>
          <label class="kb-field" for="s-remote" data-i18n="knowledge.git_remote">Git remote</label>
          <input type="text" id="s-remote" placeholder="git@github.com:user/aha-kb.git" />
          <label class="kb-field" for="s-branch" data-i18n="knowledge.git_branch">Git branch</label>
          <input type="text" id="s-branch" />
          <label class="kb-field"><input type="checkbox" id="s-auto-pull" /> <span data-i18n="knowledge.auto_pull">Auto pull</span></label>
          <label class="kb-field"><input type="checkbox" id="s-auto-commit" /> <span data-i18n="knowledge.auto_commit">Auto commit</span></label>
          <label class="kb-field"><input type="checkbox" id="s-auto-push" /> <span data-i18n="knowledge.auto_push">Auto push</span></label>
        </div>
      </div>
      <div class="kb-row"><button class="primary" type="submit" data-i18n="knowledge.save_settings">Save settings</button></div>
    </form>
  </section>

  <div id="toast" class="kb-toast"></div>
 </div>

  <script src="/static/task_memo_markdown.js"></script>
  <script src="/static/i18n.js"></script>
  <script>
    const $ = (s) => document.querySelector(s);
    const t = (key, fallback) => window.AHAI18n?.t?.(key, fallback) || fallback || key;
    const formatText = (key, values, fallback) => window.AHAI18n?.format?.(key, values, fallback) || fallback || key;
    const toast = (msg) => { const el = $("#toast"); el.textContent = msg; el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 1800); };
    const api = async (path, opts) => {
      const res = await fetch(path, Object.assign({ headers: { "Content-Type": "application/json" } }, opts));
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || res.statusText);
      return data;
    };
    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    function localTime(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleString();
    }
    function timeLine(item, keys = ["created_at", "updated_at"]) {
      return keys
        .filter((key) => item && item[key])
        .map((key) => `${t("knowledge." + key, key)} ${localTime(item[key])}`)
        .join(" · ");
    }
    function navRefSlug(path) {
      const clean = String(path || "").trim().split("#", 1)[0].split("?", 1)[0].replace(/^\.\//, "").replace(/\.md$/i, "");
      const parts = clean.split("/");
      const nested = parts.length >= 2
        && ["modules", "flows"].includes(parts[0])
        && parts.every((part) => /^[A-Za-z0-9._-]+$/.test(part));
      return nested || clean === "index" ? clean : "";
    }
    function knowledgeLinkHref(path) {
      const raw = String(path || "").trim();
      const ref = navRefSlug(raw);
      if (ref) return "#kb-entry:" + encodeURIComponent(ref);
      if (/^www\./i.test(raw)) return `https://${raw}`;
      if (/^[a-z0-9.-]+\.[a-z]{2,}(?:[/:?#]|$)/i.test(raw)) return `https://${raw}`;
      return /^(https?:|mailto:|\/|#|\.)/i.test(raw) ? raw : "";
    }
    const CAPTURE_DRAFT_KEY = "aha:kb:capture:new-note-draft";
    const state = { entries: [], pending: [], capture: [], captureConfig: {}, editingNote: null, expandedNote: null, distillTarget: null, lastBackend: "", lastModel: "", lastProxyEnabled: null, newNoteImages: [], activeEntry: null, referenceEntry: null, editingEntry: null, editingReference: false, activeTab: "entries" };

    function syncChromeText() {
      document.title = t("knowledge.title", "AHA Knowledge Base");
      window.AHAI18n?.apply?.(document);
    }

    function showTab(name) {
      state.activeTab = name;
      for (const b of document.querySelectorAll("nav.kb-tabs button")) b.classList.toggle("active", b.dataset.tab === name);
      for (const id of ["entries", "pending", "capture", "settings"]) $("#tab-" + id).hidden = id !== name;
      if (name === "pending") loadPending();
      if (name === "capture") loadCapture();
      if (name === "settings") loadSettings();
      if (name === "entries") loadEntries();
    }

    async function loadStatus() {
      try {
        const s = await api("/api/kb/status");
        $("#kb-summary").textContent = formatText("knowledge.status_summary", {
          entries: s.total_entries,
          pending: s.pending,
          stale: s.stale,
          gate: s.curation_gate,
          git: s.git.is_repo ? t("knowledge.git_repo", "repo") : t("knowledge.git_off", "off"),
        }, `Entries ${s.total_entries} · Pending ${s.pending} · Stale ${s.stale} · gate ${s.curation_gate} · git ${s.git.is_repo ? "repo" : "off"}`);
        $("#kb-summary").className = "status " + (s.enabled ? "completed" : "idle");
        $("#pending-badge").textContent = s.pending ? `(${s.pending})` : "";
      } catch (e) { $("#kb-summary").textContent = formatText("knowledge.load_failed_with_error", { error: e.message }, "Load failed: " + e.message); }
    }

    function renderEntryMarkdown() {
      if (!window.AHATaskMemoMarkdown) return;
      const activeBody = document.querySelector('[data-entry-body="active"]');
      if (activeBody && state.activeEntry) {
        activeBody.innerHTML = "";
        window.AHATaskMemoMarkdown.renderMarkdownPreview(activeBody, state.activeEntry.body || "", { documentRef: document, t, linkHref: knowledgeLinkHref });
      }
    }

    function renderEntryReferenceModal() {
      const modal = $("#entry-ref-modal");
      const ref = state.referenceEntry;
      if (!ref) {
        modal.hidden = true;
        $("#entry-ref-edit").hidden = true;
        return;
      }
      const meta = ref.meta || {};
      $("#entry-ref-title").textContent = meta.title || meta.slug || "Reference";
      $("#entry-ref-meta").textContent = `${meta.scope || "-"}/${meta.type || "-"} · ${meta.project_key || "-"} · ${meta.slug || meta.id || "-"} · ${timeLine(meta)}`;
      const body = $("#entry-ref-body");
      body.innerHTML = "";
      $("#entry-ref-edit").hidden = state.editingReference;
      if (state.editingReference) {
        body.innerHTML = renderReferenceEditForm(ref);
      } else if (window.AHATaskMemoMarkdown) {
        window.AHATaskMemoMarkdown.renderMarkdownPreview(body, ref.body || "", { documentRef: document, t, linkHref: knowledgeLinkHref });
      } else {
        body.textContent = ref.body || "";
      }
      modal.hidden = false;
    }

    function closeEntryReferenceModal() {
      state.referenceEntry = null;
      state.editingReference = false;
      renderEntryReferenceModal();
    }

    function renderEntries() {
      $("#entries-list").innerHTML = state.entries.length
        ? state.entries.map((e) => {
            const entryId = e.id || e.slug;
            const activeId = state.activeEntry?.meta?.id || state.activeEntry?.meta?.slug || "";
            const isActive = activeId === entryId;
            const isEditing = state.editingEntry === entryId && isActive;
            const encodedId = encodeURIComponent(entryId);
            const status = e.status || "active";
            return `<div class="kb-card"><h3>${esc(e.title)}</h3>
            <div class="kb-muted">${esc(e.scope)}/${esc(e.type)} · ${esc(e.project_key || "-")} · ${esc(entryId)} · ${esc(status)}</div>
            <div class="kb-muted">${esc(timeLine(e))}</div>
            <div>${(e.tags || []).map((tag) => `<span class="kb-tag">${esc(tag)}</span>`).join("")}</div>
            <div class="kb-card-actions kb-entry-actions">
              <button class="button-ghost" type="button" onclick="toggleEntry('${encodedId}')">${esc(isActive && !isEditing ? t("common.close", "Close") : t("knowledge.view", "View"))}</button>
              <button class="button-ghost" type="button" onclick="editEntry('${encodedId}')">${esc(isEditing ? t("common.cancel", "Cancel") : t("knowledge.edit", "Edit"))}</button>
              <button class="button-ghost" type="button" onclick="setEntryStatus('${encodedId}', '${status === "deprecated" ? "active" : "deprecated"}')">${esc(status === "deprecated" ? t("knowledge.restore", "Restore") : t("knowledge.deprecate", "Deprecate"))}</button>
              <button class="button-ghost" type="button" onclick="${status === "stale" ? `markEntryReviewed('${encodedId}')` : `markEntryStale('${encodedId}')`}">${esc(status === "stale" ? t("knowledge.reviewed", "Reviewed") : t("knowledge.mark_stale", "Mark stale"))}</button>
              <button class="kb-reject" type="button" onclick="deleteEntry('${encodedId}')">${esc(t("knowledge.delete", "Delete"))}</button>
            </div>
            ${isActive && !isEditing ? `<div class="kb-muted">${esc(state.activeEntry.path)}</div><div class="kb-body kb-entry-body" data-entry-body="active"></div>` : ""}
            ${isEditing ? renderEditForm(state.activeEntry) : ""}
          </div>`;
          }).join("")
        : `<p class="kb-muted">${esc(t("knowledge.entries_empty", "No entries yet"))}</p>`;
      renderEntryMarkdown();
    }

    function renderEditForm(entry) {
      const meta = entry?.meta || {};
      return `<form class="kb-edit-form" onsubmit="saveEntry(event, '${encodeURIComponent(meta.id || meta.slug || "")}')">
        <label class="kb-field">${esc(t("knowledge.edit_title", "Title"))}</label>
        <input name="title" type="text" value="${esc(meta.title || "")}" />
        <label class="kb-field">${esc(t("knowledge.edit_tags", "Tags"))}</label>
        <input name="tags" type="text" value="${esc((meta.tags || []).join(", "))}" />
        <label class="kb-field">${esc(t("knowledge.edit_related_files", "Related files"))}</label>
        <input name="related_files" type="text" value="${esc((meta.related_files || []).join(", "))}" />
        <label class="kb-field">${esc(t("knowledge.edit_invalid_when", "Invalid when"))}</label>
        <input name="invalid_when" type="text" value="${esc(meta.invalid_when || "")}" />
        <label class="kb-field">${esc(t("knowledge.edit_review_after", "Review after"))}</label>
        <input name="review_after" type="text" value="${esc(meta.review_after || "")}" />
        <label class="kb-field">${esc(t("knowledge.edit_body", "Body"))}</label>
        <textarea name="body">${esc(entry?.body || "")}</textarea>
        <div class="kb-card-actions">
          <button class="primary" type="submit">${esc(t("knowledge.save_entry", "Save entry"))}</button>
          <button class="button-ghost" type="button" onclick="cancelEdit()">${esc(t("common.cancel", "Cancel"))}</button>
        </div>
      </form>`;
    }

    function renderReferenceEditForm(entry) {
      const meta = entry?.meta || {};
      return `<form class="kb-edit-form" onsubmit="saveEntryReference(event)">
        <label class="kb-field">${esc(t("knowledge.edit_title", "Title"))}</label>
        <input name="title" type="text" value="${esc(meta.title || "")}" />
        <label class="kb-field">${esc(t("knowledge.edit_tags", "Tags"))}</label>
        <input name="tags" type="text" value="${esc((meta.tags || []).join(", "))}" />
        <label class="kb-field">${esc(t("knowledge.edit_related_files", "Related files"))}</label>
        <input name="related_files" type="text" value="${esc((meta.related_files || []).join(", "))}" />
        <label class="kb-field">${esc(t("knowledge.edit_invalid_when", "Invalid when"))}</label>
        <input name="invalid_when" type="text" value="${esc(meta.invalid_when || "")}" />
        <label class="kb-field">${esc(t("knowledge.edit_review_after", "Review after"))}</label>
        <input name="review_after" type="text" value="${esc(meta.review_after || "")}" />
        <label class="kb-field">${esc(t("knowledge.edit_body", "Body"))}</label>
        <textarea name="body">${esc(entry?.body || "")}</textarea>
        <div class="kb-card-actions">
          <button class="primary" type="submit">${esc(t("knowledge.save_entry", "Save entry"))}</button>
          <button class="button-ghost" type="button" onclick="cancelEntryReferenceEdit()">${esc(t("common.cancel", "Cancel"))}</button>
        </div>
      </form>`;
    }

    async function loadEntries() {
      const q = new URLSearchParams();
      if ($("#f-scope").value) q.set("scope", $("#f-scope").value);
      if ($("#f-kind").value) q.set("kind", $("#f-kind").value);
      if ($("#f-project").value.trim()) q.set("project", $("#f-project").value.trim());
      if ($("#f-search").value.trim()) q.set("q", $("#f-search").value.trim());
      const data = await api("/api/kb/entries?" + q.toString());
      state.entries = data.entries;
      state.activeEntry = null;
      state.referenceEntry = null;
      state.editingReference = false;
      renderEntryReferenceModal();
      renderEntries();
    }

    window.toggleEntry = async (encodedId) => {
      const id = decodeURIComponent(encodedId);
      const activeId = state.activeEntry?.meta?.id || state.activeEntry?.meta?.slug || "";
      if (activeId === id) {
        state.activeEntry = null;
        state.referenceEntry = null;
        state.editingReference = false;
        renderEntryReferenceModal();
        state.editingEntry = null;
        renderEntries();
        return;
      }
      const e = await api("/api/kb/entry?id=" + encodeURIComponent(id));
      state.activeEntry = e;
      state.referenceEntry = null;
      state.editingReference = false;
      renderEntryReferenceModal();
      state.editingEntry = null;
      renderEntries();
    };

    async function openEntryReference(encodedSlug) {
      const slug = decodeURIComponent(encodedSlug);
      try {
        state.referenceEntry = await api("/api/kb/entry?id=" + encodeURIComponent(slug));
        state.editingReference = false;
        renderEntryReferenceModal();
      } catch (e) {
        toast(formatText("knowledge.failed_with_error", { error: e.message }, "Failed: " + e.message));
      }
    }

    window.editEntry = async (encodedId) => {
      const id = decodeURIComponent(encodedId);
      if (state.editingEntry === id) {
        state.editingEntry = null;
        renderEntries();
        return;
      }
      state.activeEntry = await api("/api/kb/entry?id=" + encodeURIComponent(id));
      state.referenceEntry = null;
      state.editingReference = false;
      renderEntryReferenceModal();
      state.editingEntry = id;
      renderEntries();
    };

    window.cancelEdit = () => {
      state.editingEntry = null;
      renderEntries();
    };

    window.saveEntry = async (event, encodedId) => {
      event.preventDefault();
      const id = decodeURIComponent(encodedId);
      const form = event.currentTarget;
      const payload = {
        id,
        title: form.elements.title.value.trim(),
        tags: form.elements.tags.value,
        related_files: form.elements.related_files.value,
        invalid_when: form.elements.invalid_when.value,
        review_after: form.elements.review_after.value,
        body: form.elements.body.value,
      };
      try {
        const result = await api("/api/kb/entry", { method: "PATCH", body: JSON.stringify(payload) });
        state.activeEntry = result.entry;
        state.editingEntry = null;
        toast(t("knowledge.entry_updated", "Entry updated"));
        await loadEntries(); await loadStatus();
      } catch (e) { toast(formatText("knowledge.failed_with_error", { error: e.message }, "Failed: " + e.message)); }
    };

    window.setEntryStatus = async (encodedId, status) => {
      const id = decodeURIComponent(encodedId);
      const payload = { id, status, review_after: status === "active" ? "" : undefined };
      try {
        await api("/api/kb/entry", { method: "PATCH", body: JSON.stringify(payload) });
        toast(status === "deprecated" ? t("knowledge.deprecated", "Deprecated") : t("knowledge.restored", "Restored"));
        await loadEntries(); await loadStatus();
      } catch (e) { toast(formatText("knowledge.failed_with_error", { error: e.message }, "Failed: " + e.message)); }
    };

    window.markEntryStale = async (encodedId) => {
      const id = decodeURIComponent(encodedId);
      try {
        await api("/api/kb/entry", { method: "PATCH", body: JSON.stringify({ id, status: "stale", mark_stale: true }) });
        toast(t("knowledge.marked_stale", "Marked stale"));
        await loadEntries(); await loadStatus();
      } catch (e) { toast(formatText("knowledge.failed_with_error", { error: e.message }, "Failed: " + e.message)); }
    };

    window.markEntryReviewed = async (encodedId) => {
      const id = decodeURIComponent(encodedId);
      try {
        await api("/api/kb/entry", { method: "PATCH", body: JSON.stringify({ id, status: "active", review_after: "" }) });
        toast(t("knowledge.reviewed", "Reviewed"));
        await loadEntries(); await loadStatus();
      } catch (e) { toast(formatText("knowledge.failed_with_error", { error: e.message }, "Failed: " + e.message)); }
    };

    window.deleteEntry = async (encodedId) => {
      const id = decodeURIComponent(encodedId);
      if (!confirm(formatText("knowledge.delete_confirm", { id }, "Delete entry " + id + "?"))) return;
      try {
        await api("/api/kb/entry", { method: "DELETE", body: JSON.stringify({ id }) });
        toast(t("knowledge.deleted", "Deleted"));
        state.activeEntry = null; state.referenceEntry = null; state.editingEntry = null; state.editingReference = false;
        renderEntryReferenceModal();
        await loadEntries(); await loadStatus();
      } catch (e) { toast(formatText("knowledge.failed_with_error", { error: e.message }, "Failed: " + e.message)); }
    };

    window.saveEntryReference = async (event) => {
      event.preventDefault();
      const ref = state.referenceEntry;
      const meta = ref?.meta || {};
      const id = meta.id || meta.slug || "";
      if (!id) return;
      const form = event.currentTarget;
      const payload = {
        id,
        title: form.elements.title.value.trim(),
        tags: form.elements.tags.value,
        related_files: form.elements.related_files.value,
        invalid_when: form.elements.invalid_when.value,
        review_after: form.elements.review_after.value,
        body: form.elements.body.value,
      };
      try {
        const result = await api("/api/kb/entry", { method: "PATCH", body: JSON.stringify(payload) });
        state.referenceEntry = result.entry;
        state.editingReference = false;
        toast(t("knowledge.entry_updated", "Entry updated"));
        renderEntryReferenceModal();
        await loadStatus();
      } catch (e) { toast(formatText("knowledge.failed_with_error", { error: e.message }, "Failed: " + e.message)); }
    };

    window.cancelEntryReferenceEdit = () => {
      state.editingReference = false;
      renderEntryReferenceModal();
    };

    $("#entry-ref-edit").addEventListener("click", () => {
      if (!state.referenceEntry) return;
      state.editingReference = true;
      renderEntryReferenceModal();
    });
    $("#entry-ref-close").addEventListener("click", closeEntryReferenceModal);
    $("#entry-ref-modal").addEventListener("click", (ev) => { if (ev.target.id === "entry-ref-modal") closeEntryReferenceModal(); });

    document.addEventListener("click", (ev) => {
      const link = ev.target.closest?.('a[href^="#kb-entry:"]');
      if (!link) return;
      ev.preventDefault();
      openEntryReference(link.getAttribute("href").slice("#kb-entry:".length));
    });

    function renderPending() {
      $("#pending-list").innerHTML = state.pending.length
        ? state.pending.map((c) => `<div class="kb-card"><h3>${esc(c.title)}</h3>
            <div class="kb-muted">${esc(c.scope)}/${esc(c.kind)} · ${esc(c.project_key || "-")} · ${esc(c.id)} · ${esc(t("knowledge.confidence", "confidence"))} ${esc((c.meta || {}).confidence)}</div>
            <div class="kb-muted">${esc(timeLine(c, ["created_at", "updated_at", "last_seen_at"]))}</div>
            <div class="kb-card-actions kb-pending-actions">
              <button class="kb-approve" type="button" onclick="decide('approve','${esc(c.id)}')">${esc(t("knowledge.approve", "Approve"))}</button>
              <button class="kb-reject" type="button" onclick="decide('reject','${esc(c.id)}')">${esc(t("knowledge.reject", "Reject"))}</button>
            </div>
            <pre class="kb-body kb-pending-body">${esc(c.body)}</pre></div>`).join("")
        : `<p class="kb-muted">${esc(t("knowledge.pending_empty", "No pending candidates"))}</p>`;
    }

    async function loadPending() {
      const data = await api("/api/kb/pending");
      state.pending = data.pending;
      renderPending();
    }

    window.decide = async (kind, id) => {
      try {
        const r = await api("/api/kb/" + kind, { method: "POST", body: JSON.stringify({ candidate_id: id }) });
        toast(kind === "approve"
          ? (r.action === "updated" ? t("knowledge.entry_updated", "Entry updated") : t("knowledge.entry_created", "Entry created"))
          : t("knowledge.rejected", "Rejected"));
        await loadPending(); await loadStatus();
      } catch (e) { toast(formatText("knowledge.failed_with_error", { error: e.message }, "Failed: " + e.message)); }
    };

    function captureScopeOptions(sel) {
      return ["personal", "general", "project"].map((s) => `<option value="${s}" ${s === sel ? "selected" : ""}>${esc(t("knowledge.scope_" + s, s))}</option>`).join("");
    }

    function captureImageSrc(path) {
      // Capture image URLs render as-is; other srcs (data: etc.) pass through.
      return String(path || "");
    }

    function renderCaptureMarkdown() {
      if (!window.AHATaskMemoMarkdown) return;
      for (const n of state.capture) {
        if (state.expandedNote === n.id && state.editingNote !== n.id) {
          const el = document.querySelector(`[data-md-id="${n.id}"]`);
          if (el) {
            el.innerHTML = "";
            window.AHATaskMemoMarkdown.renderMarkdownPreview(el, n.text || "", { documentRef: document, t, imageSrc: captureImageSrc });
          }
        }
      }
    }

    function renderCapture() {
      $("#capture-list").innerHTML = state.capture.length
        ? state.capture.map((n) => {
            const editing = state.editingNote === n.id;
            const expanded = state.expandedNote === n.id;
            const full = n.text || "";
            const statusLabel = t("knowledge.capture_status_" + n.status, n.status);
            const infoText = n.status === "distilled"
              ? " · " + formatText("knowledge.capture_candidates", { count: (n.candidate_ids || []).length }, (n.candidate_ids || []).length + " candidate(s)")
              : n.status === "error" ? " · " + (n.last_error || "") : "";
            const uploadLabel = `<label class="kb-cap-upload">${esc(t("knowledge.capture_add_image", "+ image"))}<input type="file" accept="image/png,image/jpeg,image/webp" hidden onchange="uploadNoteImage('${esc(n.id)}', this)" /></label>`;
            const actions = `<div class="kb-card-actions kb-cap-actions">
                <button class="kb-approve" type="button" ${n.status === "distilling" ? "disabled" : ""} onclick="distillNote('${esc(n.id)}')">${esc(t("knowledge.capture_distill", "Distill"))}</button>
                <button class="button-ghost" type="button" onclick="showDistillLog('${esc(n.id)}')">${esc(t("knowledge.capture_agent_log_short", "Agent"))}</button>
                <button class="button-ghost" type="button" onclick="toggleNote('${esc(n.id)}')">${esc(expanded ? t("common.close", "Close") : t("knowledge.view", "View"))}</button>
                <button class="button-ghost" type="button" onclick="${editing ? "cancelNoteEdit()" : `editNote('${esc(n.id)}')`}">${esc(editing ? t("common.cancel", "Cancel") : t("knowledge.edit", "Edit"))}</button>
                <button class="kb-reject" type="button" onclick="deleteNote('${esc(n.id)}')">${esc(t("knowledge.delete", "Delete"))}</button>
              </div>`;
            const body = editing
              ? `<input class="kb-cap-edit-title" data-id="${esc(n.id)}" type="text" value="${esc(n.title || "")}" placeholder="${esc(t("knowledge.capture_title_placeholder", "Optional title"))}" />
                 <textarea class="kb-cap-edit" data-id="${esc(n.id)}" rows="4">${esc(full)}</textarea>
                 <div class="kb-row kb-cap-edit-tools">${uploadLabel}
                 <select class="kb-cap-edit-scope" data-id="${esc(n.id)}">${captureScopeOptions(n.scope_hint)}</select>
                 <button class="primary" type="button" onclick="saveNote('${esc(n.id)}')">${esc(t("knowledge.save_entry", "Save"))}</button>
                 <button class="button-ghost" type="button" onclick="cancelNoteEdit()">${esc(t("common.cancel", "Cancel"))}</button></div>`
              : expanded
              ? `<div class="kb-body kb-cap-md" data-md-id="${esc(n.id)}"></div>`
              : `<div class="kb-cap-preview">${esc(full.slice(0, 140))}</div>`;
            return `<div class="kb-card"><h3>${esc(n.title || (full.split("\n")[0] || n.id).slice(0, 80))}</h3>
              <div class="kb-muted">${esc(n.scope_hint)} · ${esc(statusLabel)}${esc(infoText)}</div>
              <div class="kb-muted">${esc(timeLine(n))}</div>
              ${actions}
              ${body}
              </div>`;
          }).join("")
        : `<p class="kb-muted">${esc(t("knowledge.capture_empty", "No capture notes"))}</p>`;
      renderCaptureMarkdown();
    }

    async function loadCapture() {
      const data = await api("/api/kb/capture");
      state.capture = data.notes || [];
      renderCapture();
      if (!state.captureBackends) loadCaptureAgents();
    }

    function configString(value, fallback = "") {
      return String(value || fallback || "").trim();
    }
    function captureEnvModelValue(name) {
      const clean = configString(name);
      return clean ? "env:" + clean : "";
    }
    function captureEnvGroupName(group, index) {
      return configString(group?.name, "env-" + (index + 1));
    }
    function captureEnvGroups(backendName) {
      const groups = state.captureConfig?.[backendName]?.env;
      return Array.isArray(groups) ? groups.filter((item) => item && typeof item === "object") : [];
    }
    function captureEnvModelLabel(backendName, group, index) {
      const name = captureEnvGroupName(group, index);
      const modelKey = backendName === "codex" ? "OPENAI_MODEL" : "ANTHROPIC_MODEL";
      const model = configString(group?.[modelKey] || group?.model, "not configured");
      return `${model} (${name})`;
    }
    function captureModelOptions(backendName) {
      const backend = (state.captureBackends || []).find((b) => b.name === backendName);
      const official = ((backend && backend.models) || []).map((m) => ({
        name: configString(m.name),
        label: configString(m.label, m.name || "default"),
      }));
      const env = captureEnvGroups(backendName).map((group, index) => {
        const name = captureEnvGroupName(group, index);
        return { name: captureEnvModelValue(name), label: captureEnvModelLabel(backendName, group, index) };
      }).filter((m) => m.name);
      return official.concat(env);
    }
    function captureDefaultModel(backendName) {
      const cfg = state.captureConfig?.[backendName] || {};
      return configString(cfg.model) || captureEnvModelValue(cfg.env_active);
    }
    function captureDefaultProxyEnabled(backendName) {
      const backendProxy = state.captureConfig?.[backendName]?.proxy || {};
      return Boolean(backendProxy.enabled);
    }
    function syncCaptureProxyCheckbox(useLast = true) {
      const checkbox = $("#cap-proxy-enabled");
      if (!checkbox) return;
      const remembered = typeof state.lastProxyEnabled === "boolean";
      checkbox.checked = useLast && remembered ? state.lastProxyEnabled : captureDefaultProxyEnabled($("#cap-backend").value);
    }
    function renderCaptureModels(selectedModel) {
      const backendName = $("#cap-backend").value;
      const models = captureModelOptions(backendName);
      $("#cap-model").innerHTML = models.map((m) => `<option value="${esc(m.name)}">${esc(m.label || m.name || "default")}</option>`).join("");
      const values = [...$("#cap-model").options].map((opt) => opt.value);
      const requested = configString(selectedModel ?? state.lastModel ?? "");
      const fallback = values.includes(requested) ? requested : captureDefaultModel(backendName);
      if (values.includes(fallback)) $("#cap-model").value = fallback;
    }

    async function loadCaptureAgents() {
      try {
        const data = await api("/api/bootstrap").catch(() => api("/api/backends"));
        state.captureBackends = data.backends || [];
        state.captureConfig = data.config || {};
        $("#cap-backend").innerHTML = state.captureBackends.map((b) => `<option value="${esc(b.name)}">${esc(b.name)}</option>`).join("");
        const backends = [...$("#cap-backend").options].map((opt) => opt.value);
        const selectedBackend = state.lastBackend || configString(state.captureConfig?.backend, "codex");
        if (backends.includes(selectedBackend)) $("#cap-backend").value = selectedBackend;
        renderCaptureModels();
        syncCaptureProxyCheckbox(false);
      } catch (e) { /* selectors stay empty -> distill falls back to server default */ }
    }

    window.editNote = (id) => { state.editingNote = id; renderCapture(); };
    window.cancelNoteEdit = () => { state.editingNote = null; renderCapture(); };
    window.toggleNote = (id) => { state.expandedNote = state.expandedNote === id ? null : id; renderCapture(); };
    window.saveNote = async (id) => {
      const title = document.querySelector(`.kb-cap-edit-title[data-id="${id}"]`).value.trim();
      const text = document.querySelector(`.kb-cap-edit[data-id="${id}"]`).value;
      const scope = document.querySelector(`.kb-cap-edit-scope[data-id="${id}"]`).value;
      try {
        await api("/api/kb/capture", { method: "PATCH", body: JSON.stringify({ id, title, text, scope_hint: scope }) });
        state.editingNote = null; await loadCapture(); toast(t("knowledge.saved", "Saved"));
      } catch (e) { toast(formatText("knowledge.failed_with_error", { error: e.message }, "Failed: " + e.message)); }
    };
    window.deleteNote = async (id) => {
      const note = state.capture.find((n) => n.id === id);
      const title = (note?.title || String(note?.text || "").split("\n")[0] || id).slice(0, 80);
      if (!confirm(formatText("knowledge.capture_delete_confirm", { title }, "Delete note " + title + "?"))) return;
      try { await api("/api/kb/capture", { method: "DELETE", body: JSON.stringify({ id }) }); await loadCapture(); await loadStatus(); }
      catch (e) { toast(formatText("knowledge.failed_with_error", { error: e.message }, "Failed: " + e.message)); }
    };
    function closeDistillLogModal() { $("#cap-log-modal").hidden = true; }
    window.showDistillLog = async (id) => {
      try {
        const data = await api("/api/kb/capture/distill-log?id=" + encodeURIComponent(id));
        const log = data.log || {};
        const model = log.model || "default";
        const times = [log.started_at, log.finished_at].filter(Boolean).map(localTime).join(" -> ");
        $("#cap-log-meta").textContent = [log.status, log.backend, model, times].filter(Boolean).join(" · ");
        $("#cap-log-prompt").textContent = log.prompt || "";
        $("#cap-log-reply").textContent = log.reply || (log.error ? "ERROR:\n" + log.error : "");
        $("#cap-log-modal").hidden = false;
      } catch (e) {
        const missing = t("knowledge.capture_log_missing", "No distill log yet");
        toast(e.message === "distill log not found" ? missing : formatText("knowledge.failed_with_error", { error: e.message }, "Failed: " + e.message));
      }
    };
    $("#cap-log-close").addEventListener("click", closeDistillLogModal);
    $("#cap-log-modal").addEventListener("click", (ev) => { if (ev.target.id === "cap-log-modal") closeDistillLogModal(); });
    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error || new Error("Failed to read image"));
        reader.readAsDataURL(file);
      });
    }
    window.uploadNoteImage = async (id, input) => {
      const file = input.files && input.files[0];
      if (!file) return;
      try {
        const dataUrl = await readFileAsDataUrl(file);
        const editTitle = document.querySelector(`.kb-cap-edit-title[data-id="${id}"]`);
        const editText = document.querySelector(`.kb-cap-edit[data-id="${id}"]`);
        const editScope = document.querySelector(`.kb-cap-edit-scope[data-id="${id}"]`);
        if (editText) {
          await api("/api/kb/capture", { method: "PATCH", body: JSON.stringify({ id, title: editTitle?.value.trim(), text: editText.value, scope_hint: editScope?.value }) });
        }
        await api("/api/kb/capture/image", { method: "POST", body: JSON.stringify({ id, filename: file.name, data_url: dataUrl }) });
        await loadCapture();
      } catch (e) { toast(formatText("knowledge.failed_with_error", { error: e.message }, "Failed: " + e.message)); }
      finally {
        input.value = "";
      }
    };
    window.deleteNoteImage = async (id, name) => {
      try { await api("/api/kb/capture/image", { method: "DELETE", body: JSON.stringify({ id, name }) }); await loadCapture(); }
      catch (e) { toast(formatText("knowledge.failed_with_error", { error: e.message }, "Failed: " + e.message)); }
    };
    // Clicking distill opens a small modal to pick backend/model (remembered).
    window.distillNote = async (id) => {
      state.distillTarget = id;
      if (!state.captureBackends) await loadCaptureAgents();
      if (state.lastBackend) { $("#cap-backend").value = state.lastBackend; renderCaptureModels(); }
      if (state.lastModel) $("#cap-model").value = state.lastModel;
      syncCaptureProxyCheckbox(true);
      $("#cap-distill-modal").hidden = false;
    };
    function closeDistillModal() { $("#cap-distill-modal").hidden = true; state.distillTarget = null; }
    $("#cap-distill-cancel").addEventListener("click", closeDistillModal);
    $("#cap-distill-modal").addEventListener("click", (ev) => { if (ev.target.id === "cap-distill-modal") closeDistillModal(); });
    $("#cap-distill-go").addEventListener("click", () => {
      const id = state.distillTarget;
      state.lastBackend = $("#cap-backend").value;
      state.lastModel = $("#cap-model").value;
      state.lastProxyEnabled = $("#cap-proxy-enabled").checked;
      closeDistillModal();
      if (id) runDistill(id, state.lastBackend || null, state.lastModel || null, state.lastProxyEnabled);
    });

    async function runDistill(id, backend, model, proxyEnabled) {
      try {
        await api("/api/kb/capture/distill", { method: "POST", body: JSON.stringify({ id, backend, model, proxy_enabled: Boolean(proxyEnabled) }) });
        toast(t("knowledge.capture_distilling", "Distilling…"));
        await loadCapture();
        for (let i = 0; i < 60; i++) {
          await new Promise((r) => setTimeout(r, 1500));
          const n = await api("/api/kb/capture?id=" + encodeURIComponent(id));
          if (n.status !== "distilling") {
            await loadCapture(); await loadStatus();
            toast(n.status === "distilled"
              ? formatText("knowledge.capture_done", { count: (n.candidate_ids || []).length }, (n.candidate_ids || []).length + " → Pending")
              : formatText("knowledge.failed_with_error", { error: n.last_error || "error" }, "Failed: " + (n.last_error || "error")));
            return;
          }
        }
      } catch (e) { toast(formatText("knowledge.failed_with_error", { error: e.message }, "Failed: " + e.message)); }
    }

    function renderNewNoteImageCount() {
      const count = state.newNoteImages.length;
      $("#cap-new-image-count").textContent = count
        ? formatText("knowledge.capture_images_queued", { count }, count + " image(s) queued")
        : "";
    }
    function resetNewNoteForm() {
      $("#cap-text").value = "";
      $("#cap-title").value = "";
      $("#cap-scope").value = "personal";
      renderNewNoteImageCount();
    }
    function newNoteDraft() {
      return { text: $("#cap-text").value, title: $("#cap-title").value, scope: $("#cap-scope").value };
    }
    function saveNewNoteDraft() {
      try { localStorage.setItem(CAPTURE_DRAFT_KEY, JSON.stringify(newNoteDraft())); }
      catch (e) { /* Draft cache is best-effort. */ }
    }
    function restoreNewNoteDraft() {
      let draft = null;
      try { draft = JSON.parse(localStorage.getItem(CAPTURE_DRAFT_KEY) || "null"); }
      catch (e) { draft = null; }
      $("#cap-text").value = draft?.text || "";
      $("#cap-title").value = draft?.title || "";
      $("#cap-scope").value = draft?.scope || "personal";
      renderNewNoteImageCount();
    }
    function clearNewNoteDraft() {
      try { localStorage.removeItem(CAPTURE_DRAFT_KEY); }
      catch (e) { /* Draft cache is best-effort. */ }
      state.newNoteImages = [];
      resetNewNoteForm();
    }
    function openNewNoteModal() {
      restoreNewNoteDraft();
      $("#cap-new-modal").hidden = false;
      setTimeout(() => $("#cap-text").focus(), 0);
    }
    function closeNewNoteModal(clearDraft) {
      if (!clearDraft) saveNewNoteDraft();
      $("#cap-new-modal").hidden = true;
      if (clearDraft) clearNewNoteDraft();
    }
    async function queueNewNoteImage(input) {
      const file = input.files && input.files[0];
      if (!file) return;
      try {
        const dataUrl = await readFileAsDataUrl(file);
        state.newNoteImages.push({ filename: file.name, data_url: dataUrl });
        saveNewNoteDraft();
        renderNewNoteImageCount();
      } catch (e) { toast(formatText("knowledge.failed_with_error", { error: e.message }, "Failed: " + e.message)); }
      finally { input.value = ""; }
    }
    $("#cap-new-open").addEventListener("click", openNewNoteModal);
    $("#cap-new-cancel").addEventListener("click", () => closeNewNoteModal(false));
    $("#cap-new-modal").addEventListener("click", (ev) => { if (ev.target.id === "cap-new-modal") closeNewNoteModal(false); });
    $("#cap-new-image").addEventListener("change", (ev) => queueNewNoteImage(ev.currentTarget));
    for (const id of ["#cap-text", "#cap-title"]) $(id).addEventListener("input", saveNewNoteDraft);
    $("#cap-scope").addEventListener("change", saveNewNoteDraft);

    $("#capture-form").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const text = $("#cap-text").value;
      if (!text.trim()) return;
      let noteId = "";
      try {
        const created = await api("/api/kb/capture", { method: "POST", body: JSON.stringify({ text, scope_hint: $("#cap-scope").value, title: $("#cap-title").value.trim() || null }) });
        noteId = created.note?.id || "";
        for (const image of state.newNoteImages) {
          await api("/api/kb/capture/image", { method: "POST", body: JSON.stringify({ id: noteId, filename: image.filename, data_url: image.data_url }) });
        }
        closeNewNoteModal(true);
        await loadCapture(); await loadStatus(); toast(t("knowledge.saved", "Saved"));
      } catch (e) {
        if (noteId) {
          closeNewNoteModal(true);
          await loadCapture(); await loadStatus();
        }
        toast(formatText("knowledge.failed_with_error", { error: e.message }, "Failed: " + e.message));
      }
    });
    $("#cap-backend").addEventListener("change", () => { renderCaptureModels(); syncCaptureProxyCheckbox(false); });

    async function loadSettings() {
      const s = await api("/api/kb/config");
      $("#s-enabled").checked = s.enabled;
      $("#s-path").value = s.path || "";
      $("#s-gate").value = s.curation.gate || "manual";
      $("#s-git-enabled").checked = s.git.enabled;
      $("#s-remote").value = s.git.remote || "";
      $("#s-branch").value = s.git.branch || "main";
      $("#s-auto-pull").checked = s.git.auto_pull;
      $("#s-auto-commit").checked = s.git.auto_commit;
      $("#s-auto-push").checked = s.git.auto_push;
    }

    $("#settings-form").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const payload = {
        enabled: $("#s-enabled").checked,
        path: $("#s-path").value.trim() || null,
        curation: { gate: $("#s-gate").value },
        git: {
          enabled: $("#s-git-enabled").checked,
          remote: $("#s-remote").value.trim() || null,
          branch: $("#s-branch").value.trim() || "main",
          auto_pull: $("#s-auto-pull").checked,
          auto_commit: $("#s-auto-commit").checked,
          auto_push: $("#s-auto-push").checked,
        },
      };
      try { await api("/api/kb/config", { method: "PATCH", body: JSON.stringify(payload) }); toast(t("knowledge.saved", "Saved")); await loadStatus(); }
      catch (e) { toast(formatText("knowledge.save_failed_with_error", { error: e.message }, "Save failed: " + e.message)); }
    });

    for (const b of document.querySelectorAll("nav.kb-tabs button")) b.addEventListener("click", () => showTab(b.dataset.tab));
    $("#f-refresh").addEventListener("click", loadEntries);
    for (const id of ["#f-scope", "#f-kind"]) $(id).addEventListener("change", loadEntries);
    for (const id of ["#f-project", "#f-search"]) $(id).addEventListener("keydown", (event) => {
      if (event.key === "Enter") loadEntries();
    });
    window.addEventListener("aha:languagechange", () => {
      syncChromeText();
      renderEntries();
      renderPending();
      renderCapture();
      if (state.activeTab === "settings") loadSettings();
      loadStatus();
    });
    window.addEventListener("storage", (event) => {
      if (event.key === window.AHAI18n?.languageStorageKey) window.AHAI18n.setLanguage(event.newValue);
    });
    syncChromeText();
    loadStatus(); loadEntries();
  </script>
</body>
</html>
